<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero medios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Elementos para decorar el fondo del tablero -->
    <div class="liquid-blob blob-1"></div>
    <div class="liquid-blob blob-2"></div>

    <nav class="glass-header sticky top-0 z-40 mb-12">
        <div class="max-w-6xl mx-auto px-6 py-6 flex justify-center items-center">
            <div class="text-center">
                <h1 class="text-3xl font-bold tracking-tighter liquid-text uppercase">Seguimiento de medios de comunicación</h1>
                <p class="text-blue-300/60 text-[10px] uppercase tracking-[0.5em] mt-1 font-semibold"><Noscript>5 DE FEBRERO DE 2026</Noscript></p>
            </div>
        </div>
    </nav>
    
    <div class="max-w-6xl mx-auto px-6 pb-24">
        <main id="board" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"> 
        </main>
    </div>

    <script type="module" src="app.js"></script>

</body>
</html>
